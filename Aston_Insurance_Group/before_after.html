  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #FFFFFF; }

    /* Toggle pill */
    .toggle-track {
      width: 320px;
      height: 52px;
      border-radius: 26px;
      position: relative;
      cursor: pointer;
      transition: background-color 0.4s ease;
      user-select: none;
    }
    .toggle-track.before-state {
      background-color: #FEF2F2;
      border: 1px solid #FECACA;
    }
    .toggle-track.after-state {
      background-color: #F0FDF4;
      border: 1px solid #BBF7D0;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      height: 44px;
      width: 154px;
      border-radius: 22px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    .toggle-thumb.before-pos {
      left: 3px;
      background-color: #DC2626;
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
    }
    .toggle-thumb.after-pos {
      left: 161px;
      background-color: #16A34A;
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
    }
    .toggle-label {
      position: absolute;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.4s ease;
      pointer-events: none;
    }
    .toggle-label-left {
      left: 0;
      width: 160px;
    }
    .toggle-label-right {
      right: 0;
      width: 160px;
    }

    /* Card transitions */
    .process-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .process-card .border-indicator {
      transition: background-color 0.5s ease;
    }
    .stat-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .financial-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Timeline */
    .timeline-container {
      transition: opacity 0.5s ease, max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), margin 0.5s ease;
      overflow: hidden;
    }
    .timeline-container.hidden-timeline {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
      margin-bottom: 0;
    }
    .timeline-container.visible-timeline {
      opacity: 1;
      max-height: 500px;
      margin-top: 48px;
    }

    /* Savings badge */
    .savings-badge {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .savings-badge.hidden-badge {
      opacity: 0;
      transform: translateY(-4px);
    }
    .savings-badge.visible-badge {
      opacity: 1;
      transform: translateY(0);
    }

    /* Content swap animation */
    .content-value {
      transition: opacity 0.35s ease;
    }

    /* Subtle animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.6s ease forwards;
    }

    /* Print styles */
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>

                            </div>
                            <div>
                              <h3 className="text-sm font-semibold text-gray-900">{proc.title}</h3>
                              <span
                                className="inline-block mt-1 text-[10px] font-semibold uppercase tracking-widest px-2 py-0.5 rounded-full"
                                style={{
                                  backgroundColor: isAfter ? '#DCFCE7' : (data.severity === 'amber' ? '#FEF3C7' : '#FEE2E2'),
                                  color: isAfter ? '#15803D' : (data.severity === 'amber' ? '#92400E' : '#991B1B'),
                                }}
                              >
                                {isAfter ? 'Automated' : (data.severity === 'amber' ? 'Needs Improvement' : 'Critical')}
                              </span>
                            </div>
                          </div>
                          <div
                            className={`savings-badge ${isAfter ? 'visible-badge' : 'hidden-badge'}`}
                          >
                            {isAfter && (
                              <span className="inline-flex items-center gap-1 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-full px-2.5 py-1">
                                <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" />
                                </svg>
                                {proc.savings}
                              </span>
                            )}
                          </div>
                        </div>
                        <div className="mt-2">
                          <div className="text-lg font-bold text-gray-900 tracking-tight">{data.metric}</div>
                          <p className="text-sm text-gray-500 mt-0.5">{data.detail}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </section>

            {/* Financial Impact Section */}
            <section className="mb-0">
              <div className="mb-6">
                <h2 className="text-lg font-semibold text-gray-900 tracking-tight">Financial Impact</h2>
                <p className="text-sm text-gray-500 mt-1">Quantified cost analysis and projected savings</p>
              </div>

              <div
                className="financial-card rounded-xl border overflow-hidden"
                style={{
                  backgroundColor: isAfter ? '#FAFFFE' : '#FFFAFA',
                  borderColor: isAfter ? '#DCFCE7' : '#FEE2E2',
                  boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
                }}
              >
                <div className="p-6">
                  <div className="flex items-center gap-2 mb-6">
                    <div
                      className="w-8 h-8 rounded-lg flex items-center justify-center"
                      style={{
                        backgroundColor: isAfter ? '#DCFCE7' : '#FEE2E2',
                        color: isAfter ? '#16A34A' : '#DC2626',
                      }}
                    >
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                    </div>
                    <h3 className="text-sm font-semibold text-gray-900 uppercase tracking-wider">
                      {isAfter ? 'Projected Returns' : 'Current Cost Exposure'}
                    </h3>
                  </div>

                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                    {isAfter ? (
                      <>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Annual Savings</p>
                          <p className="text-2xl font-bold text-emerald-700">$78,936</p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Implementation Cost</p>
                          <p className="text-2xl font-bold text-gray-900">$21,500</p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Payback Period</p>
                          <p className="text-2xl font-bold text-emerald-700">3.3 mo</p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">3-Year Cumulative</p>
                          <p className="text-2xl font-bold text-emerald-700">$208,758</p>
                        </div>
                      </>
                    ) : (
                      <>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Automatable Labor Cost</p>
                          <p className="text-2xl font-bold text-red-700">$143,780<span className="text-sm font-medium text-red-400">/yr</span></p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">FTE Lost to Verification</p>
                          <p className="text-2xl font-bold text-red-700">1 FTE</p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Marketing Revenue</p>
                          <p className="text-2xl font-bold text-red-700">$0</p>
                        </div>
                        <div>
                          <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Concentration Risk</p>
                          <p className="text-2xl font-bold text-red-700">90% ACA</p>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            </section>

            {/* Implementation Timeline -- After mode only */}
            <section className={`timeline-container ${isAfter ? 'visible-timeline' : 'hidden-timeline'}`}>
              <div className="mb-6">
                <h2 className="text-lg font-semibold text-gray-900 tracking-tight">Implementation Timeline</h2>
                <p className="text-sm text-gray-500 mt-1">Phased rollout to minimize disruption</p>
              </div>

              <div
                className="rounded-xl border border-emerald-100 bg-white p-6 lg:p-8"
                style={{ boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}
              >
                <div className="relative">
                  {/* Connector line */}
                  <div className="hidden md:block absolute top-6 left-[calc(12.5%+16px)] right-[calc(12.5%+16px)] h-0.5 bg-gray-200" style={{ zIndex: 0 }} />
                  <div
                    className="hidden md:block absolute top-6 left-[calc(12.5%+16px)] h-0.5 bg-emerald-400"
                    style={{
                      zIndex: 1,
                      width: isAfter ? '100%' : '0%',
                      maxWidth: 'calc(75% - 32px)',
                      transition: 'width 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s',
                    }}
                  />

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-6 md:gap-4 relative" style={{ zIndex: 2 }}>
                    {timelinePhases.map((phase, idx) => (
                      <div key={idx} className="flex flex-col items-center text-center">
                        <div
                          className="w-12 h-12 rounded-full flex items-center justify-center border-2 bg-white mb-3"
                          style={{
                            borderColor: phase.color,
                            boxShadow: `0 0 0 4px ${phase.color}15`,
                          }}
                        >
                          <span className="text-xs font-bold" style={{ color: phase.color }}>
                            {idx === 3 ? (
                              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                              </svg>
                            ) : (
                              `0${idx + 1}`
                            )}
                          </span>
                        </div>
                        <h4 className="text-sm font-semibold text-gray-900">{phase.phase}</h4>
                        <p className="text-xs text-gray-400 mt-0.5">{phase.period}</p>
                        <span
                          className="inline-block mt-2 text-xs font-medium px-3 py-1 rounded-full"
                          style={{
                            backgroundColor: `${phase.color}10`,
                            color: phase.color,
                          }}
                        >
                          {phase.label}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

          </main>

          {/* Footer */}
          <footer className="border-t border-gray-100 mt-16">
            <div className="max-w-6xl mx-auto px-6 py-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
              <div className="flex items-center gap-2">
                <div className="w-6 h-6 rounded bg-gray-900 flex items-center justify-center">
                  <span className="text-white font-bold text-[10px]">A</span>
                </div>
                <span className="text-sm text-gray-400">Aston Insurance Group</span>
                <span className="text-gray-200 mx-1">|</span>
                <span className="text-sm text-gray-400">Operations Transformation Analysis</span>
              </div>
              <div className="flex items-center gap-1 text-sm text-gray-400">
                <span>March 2026</span>
                <span className="text-gray-200 mx-1">|</span>
                <span>Prepared by <span className="font-medium text-gray-500">Run Crewless</span></span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
