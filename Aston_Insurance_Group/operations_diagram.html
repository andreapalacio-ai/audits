<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aston Insurance Group - Mapa de Oportunidades de Automatizacion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #FFFFFF; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .detail-enter { animation: slideDown 0.25s ease-out; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .phase-col { min-width: 220px; }
    ::-webkit-scrollbar { height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    /* ------------------------------------------------------------------ */
    /*  DATA                                                               */
    /* ------------------------------------------------------------------ */

    const phases = [
      {
        name: 'Adquisicion',
        accent: '#3B82F6',
        accentLight: '#EFF6FF',
        processes: [
          { id: 'acq-1', name: 'Solo Referidos', status: 'warning', metric: '100% de prospectos', detail: 'Sin marketing activo ni llamadas salientes. Todos los clientes llegan por recomendacion.', risk: 'Dependencia de un solo canal' },
          { id: 'acq-2', name: 'Llamadas Entrantes', status: 'normal', metric: '500+/mes', detail: 'RingCentral VoIP - 4 hrs/dia del equipo. NO integrado con ZOHO.' },
          { id: 'acq-3', name: 'WhatsApp', status: 'unknown', metric: 'Volumen desconocido', detail: 'Se usa WhatsApp Business pero se desconoce el estado de integracion API.' },
          { id: 'acq-4', name: 'Ingreso Manual de Prospectos', status: 'automate', metric: '5-10 min c/u', detail: 'Ingreso manual de 20-50 prospectos/mes en ZOHO.', savings: '$2,080/ano' },
        ],
      },
      {
        name: 'Incorporacion',
        accent: '#8B5CF6',
        accentLight: '#F5F3FF',
        processes: [
          { id: 'onb-1', name: 'Llamada Inicial', status: 'normal', metric: '10-60+ min', detail: '20-50 clientes nuevos/mes. Duracion de llamada muy variable.' },
          { id: 'onb-2', name: 'Cotizacion Health Sherpa', status: 'normal', metric: '20-45 min', detail: 'Comparacion de planes ACA mediante plataforma certificada.' },
          { id: 'onb-3', name: 'Recopilacion de Consentimiento', status: 'critical', metric: 'Via Cliq/Email', detail: 'NO SE CAPTURA CONSENTIMIENTO SMS. No se puede hacer marketing masivo por SMS legalmente.', risk: 'Brecha de Cumplimiento TCPA' },
          { id: 'onb-4', name: 'Recopilacion de Documentos', status: 'automate', metric: '30-60 min/caso', detail: 'Seguimiento manual de documentos faltantes.', savings: '$4,160/ano' },
          { id: 'onb-5', name: 'Envio de Solicitud', status: 'normal', metric: '15-30 min', detail: 'Envio mediante Health Sherpa o portal de aseguradora.' },
        ],
      },
      {
        name: 'Servicio de Polizas',
        accent: '#EC4899',
        accentLight: '#FDF2F8',
        processes: [
          { id: 'svc-1', name: 'Verificacion de Polizas', status: 'critical', metric: '8-15 min c/u', detail: 'Mery = 100% dedicada a esto. 3,000 polizas en temporada alta, 300 normal. Busqueda manual en Healthcare.gov.', savings: '$34,580/ano', risk: 'Cuello de Botella 1 FTE' },
          { id: 'svc-2', name: 'Revision de Pagos', status: 'normal', metric: 'Mensual', detail: 'Descargar listas de aseguradoras, cruzar datos manualmente.' },
          { id: 'svc-3', name: 'Seguimiento de Pagos', status: 'automate', metric: '5-7 min c/u', detail: '45-80 clientes/mes. SMS manual uno por uno via RingCentral.', savings: '$6,240/ano' },
          { id: 'svc-4', name: 'Tareas Administrativas', status: 'automate', metric: '25 min c/u', detail: 'Yuliana 80% en admin. ~100 tareas/mes.', savings: '$10,920/ano' },
          { id: 'svc-5', name: 'Solicitudes de Tarjeta de ID', status: 'normal', metric: '10 min c/u', detail: '~100 solicitudes/mes de tarjetas de ID y listas de doctores.' },
        ],
      },
      {
        name: 'Retencion',
        accent: '#F59E0B',
        accentLight: '#FFFBEB',
        processes: [
          { id: 'ret-1', name: 'Contacto de Renovacion', status: 'warning', metric: 'No sistematico', detail: 'Sin recordatorios automaticos de renovacion. Contacto ad-hoc durante inscripcion abierta.', savings: '$8,320/ano', risk: 'Riesgo de Perdida' },
          { id: 'ret-2', name: 'Inscripcion Abierta', status: 'normal', metric: 'Oct-Dic', detail: 'Temporada alta. Todo el equipo ocupado.' },
          { id: 'ret-3', name: 'Recuperacion', status: 'missing', metric: 'No definido', detail: 'No existe proceso de recuperacion de clientes.', risk: 'Ingresos Perdidos' },
        ],
      },
      {
        name: 'No Se Esta Haciendo',
        accent: '#EF4444',
        accentLight: '#FEF2F2',
        processes: [
          { id: 'gap-1', name: 'Contacto de Cumpleanos', status: 'missing', metric: 'Nunca', detail: 'Cero mensajes de cumpleanos enviados. Oportunidad de victoria rapida.', savings: '$2,600/ano ingresos' },
          { id: 'gap-2', name: 'Activador de Edad Medicare', status: 'missing', metric: 'Nunca', detail: 'No se rastrean clientes que cumplen 65. Se pierde la venta cruzada de Medicare.', savings: '$15,000+/ano ingresos' },
          { id: 'gap-3', name: 'Marketing por Email', status: 'missing', metric: '0 campanas', detail: '3,000 emails de clientes, CERO campanas enviadas.', savings: '$15,600/ano ingresos' },
          { id: 'gap-4', name: 'Ventas Salientes', status: 'missing', metric: 'Nunca', detail: 'Sin tiempo para llamadas salientes. El personal esta consumido por el servicio.', savings: 'Por determinar post-automatizacion' },
        ],
      },
    ];

    const statusConfig = {
      critical:  { label: 'Critico',        color: '#EF4444', bg: '#FEF2F2', border: 'solid' },
      automate:  { label: 'Automatizar',    color: '#10B981', bg: '#ECFDF5', border: 'solid' },
      warning:   { label: 'Alerta',         color: '#F59E0B', bg: '#FFFBEB', border: 'solid' },
      missing:   { label: 'Faltante',       color: '#F87171', bg: '#FEF2F2', border: 'dashed' },
      normal:    { label: 'Normal',         color: '#9CA3AF', bg: '#F9FAFB', border: 'solid' },
      unknown:   { label: 'Desconocido',    color: '#818CF8', bg: '#EEF2FF', border: 'solid' },
    };

    const roiMetrics = [
      { label: 'Ahorro Anual', value: '$78,936', sub: 'Oportunidad identificada' },
      { label: 'Periodo de Recuperacion', value: '3.3 meses', sub: 'Tiempo para recuperar la inversion' },
      { label: 'ROI a 3 Anos', value: '1,002%', sub: 'Retorno sobre la inversion' },
    ];

    const keyFindings = [
      {
        title: 'Problemas Criticos',
        color: '#EF4444',
        items: [
          'Verificacion de polizas consume 1 FTE (Mery 100%)',
          'No se captura consentimiento SMS',
          'RingCentral no integrado con ZOHO',
        ],
      },
      {
        title: 'Principales Oportunidades de ROI',
        color: '#10B981',
        items: [
          'RPA de Verificacion de Polizas $34,580/ano',
          'Marketing por Email $15,600/ano',
          'Automatizacion de Flujos ZOHO $10,920/ano',
        ],
      },
      {
        title: 'Victorias Rapidas',
        color: '#3B82F6',
        items: [
          'Agregar checkbox de consentimiento SMS al formulario',
          'Automatizacion de cumpleanos en ZOHO',
          'Activador de edad Medicare (65)',
        ],
      },
    ];

    /* ------------------------------------------------------------------ */
    /*  COMPONENTS                                                         */
    /* ------------------------------------------------------------------ */

    function StatusDot({ status }) {
      const cfg = statusConfig[status];
      const isDashed = cfg.border === 'dashed';
      return (
        <span
          style={{
            display: 'inline-block',
            width: 8,
            height: 8,
            borderRadius: '50%',
            backgroundColor: isDashed ? 'transparent' : cfg.color,
            border: isDashed ? `2px dashed ${cfg.color}` : 'none',
            flexShrink: 0,
          }}
        />
      );
    }

    function ProcessCard({ process, phaseAccent, isSelected, onClick }) {
      const cfg = statusConfig[process.status];
      const isDashed = cfg.border === 'dashed';
      return (
        <div
          onClick={onClick}
          className="card-hover cursor-pointer rounded-lg bg-white p-3.5 mb-2.5"
          style={{
            borderLeft: `3px ${isDashed ? 'dashed' : 'solid'} ${cfg.color}`,
            boxShadow: isSelected
              ? `0 0 0 2px ${phaseAccent}22, 0 4px 15px rgba(0,0,0,0.08)`
              : '0 1px 4px rgba(0,0,0,0.06)',
            transition: 'all 0.2s ease',
          }}
        >
          <div className="flex items-start gap-2">
            <StatusDot status={process.status} />
            <div className="min-w-0 flex-1">
              <p className="text-[13px] font-semibold text-gray-800 leading-tight">{process.name}</p>
              <p className="text-[11px] text-gray-400 mt-0.5">{process.metric}</p>
              {process.savings && (
                <p className="text-[11px] font-medium text-emerald-600 mt-1">{process.savings}</p>
              )}
              {process.risk && (
                <p className="text-[11px] font-medium text-red-500 mt-0.5">{process.risk}</p>
              )}
            </div>
          </div>
        </div>
      );
    }

    function PhaseColumn({ phase, selectedId, onSelect }) {
      return (
        <div className="phase-col flex-shrink-0" style={{ width: 232 }}>
          {/* Phase header */}
          <div className="mb-3 pb-2" style={{ borderBottom: `2px solid ${phase.accent}` }}>
            <div className="flex items-center gap-2">
              <span
                className="w-2.5 h-2.5 rounded-full flex-shrink-0"
                style={{ backgroundColor: phase.accent }}
              />
              <h3 className="text-sm font-bold text-gray-800 tracking-tight">{phase.name}</h3>
            </div>
            <p className="text-[11px] text-gray-400 mt-0.5 pl-[18px]">
              {phase.processes.length} proceso{phase.processes.length !== 1 ? 's' : ''}
            </p>
          </div>
          {/* Cards */}
          <div>
            {phase.processes.map((proc) => (
              <ProcessCard
                key={proc.id}
                process={proc}
                phaseAccent={phase.accent}
                isSelected={selectedId === proc.id}
                onClick={() => onSelect(proc.id === selectedId ? null : proc.id)}
              />
            ))}
          </div>
        </div>
      );
    }

    function DetailPanel({ process, phaseAccent, onClose }) {
      if (!process) return null;
      const cfg = statusConfig[process.status];
      return (
        <div className="detail-enter mt-6 rounded-xl bg-white p-6" style={{ boxShadow: '0 2px 20px rgba(0,0,0,0.08)' }}>
          <div className="flex items-start justify-between">
            <div className="flex items-center gap-3">
              <span
                className="w-3 h-3 rounded-full flex-shrink-0"
                style={{
                  backgroundColor: cfg.border === 'dashed' ? 'transparent' : cfg.color,
                  border: cfg.border === 'dashed' ? `2px dashed ${cfg.color}` : `2px solid ${cfg.color}`,
                }}
              />
              <div>
                <h4 className="text-base font-bold text-gray-800">{process.name}</h4>
                <span
                  className="inline-block mt-1 text-[11px] font-medium px-2 py-0.5 rounded-full"
                  style={{ backgroundColor: cfg.bg, color: cfg.color }}
                >
                  {cfg.label}
                </span>
              </div>
            </div>
            <button
              onClick={onClose}
              className="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors text-sm"
            >
              &times;
            </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-5">
            {/* Detail */}
            <div className="sm:col-span-2">
              <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Detalle del Proceso</p>
              <p className="text-sm text-gray-700 leading-relaxed">{process.detail}</p>
            </div>
            {/* Meta */}
            <div className="space-y-3">
              <div>
                <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-0.5">Tiempo / Volumen</p>
                <p className="text-sm font-medium text-gray-800">{process.metric}</p>
              </div>
              {process.savings && (
                <div>
                  <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-0.5">Ahorro Estimado</p>
                  <p className="text-sm font-bold text-emerald-600">{process.savings}</p>
                </div>
              )}
              {process.risk && (
                <div>
                  <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-0.5">Riesgo</p>
                  <p className="text-sm font-bold text-red-500">{process.risk}</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(null);

      const selectedProcess = (() => {
        if (!selectedId) return null;
        for (const phase of phases) {
          const p = phase.processes.find((pr) => pr.id === selectedId);
          if (p) return { ...p, phaseAccent: phase.accent };
        }
        return null;
      })();

      return (
        <div className="min-h-screen bg-white">
          {/* ---- HEADER ---- */}
          <header className="border-b border-gray-100">
            <div className="max-w-7xl mx-auto px-6 py-8">
              <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
                <div>
                  <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Aston Insurance Group</h1>
                  <p className="text-sm text-gray-500 mt-1 font-medium">Mapa de Oportunidades de Automatizacion</p>
                </div>
                <div className="flex items-center gap-5 text-[12px] text-gray-400 font-medium">
                  <span className="flex items-center gap-1.5">
                    <svg className="w-3.5 h-3.5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m0 0a4 4 0 118 0m-8 0a4 4 0 008 0m-4-8a4 4 0 100-8 4 4 0 000 8z"/></svg>
                    ~3,000 Clientes
                  </span>
                  <span className="flex items-center gap-1.5">
                    <svg className="w-3.5 h-3.5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    5 Miembros del Equipo
                  </span>
                  <span className="flex items-center gap-1.5">
                    <svg className="w-3.5 h-3.5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    90% Enfoque ACA
                  </span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-8">

            {/* ---- ROI SUMMARY ---- */}
            <section>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {roiMetrics.map((m, i) => (
                  <div
                    key={i}
                    className="rounded-xl bg-white p-5"
                    style={{ boxShadow: '0 1px 8px rgba(0,0,0,0.06)' }}
                  >
                    <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">{m.label}</p>
                    <p className="text-2xl font-bold text-gray-900 mt-1">{m.value}</p>
                    <p className="text-[11px] text-gray-400 mt-0.5">{m.sub}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* ---- LEGEND ---- */}
            <section>
              <div className="flex flex-wrap items-center gap-x-5 gap-y-2 text-[12px] text-gray-500">
                <span className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mr-1">Estado:</span>
                {Object.entries(statusConfig).map(([key, cfg]) => (
                  <span key={key} className="flex items-center gap-1.5">
                    <StatusDot status={key} />
                    {cfg.label}
                  </span>
                ))}
              </div>
            </section>

            {/* ---- PHASE COLUMNS ---- */}
            <section>
              <div className="overflow-x-auto -mx-6 px-6 pb-2">
                <div className="flex gap-4" style={{ minWidth: '1180px' }}>
                  {phases.map((phase) => (
                    <PhaseColumn
                      key={phase.name}
                      phase={phase}
                      selectedId={selectedId}
                      onSelect={setSelectedId}
                    />
                  ))}
                </div>
              </div>
            </section>

            {/* ---- DETAIL PANEL ---- */}
            {selectedProcess && (
              <DetailPanel
                process={selectedProcess}
                phaseAccent={selectedProcess.phaseAccent}
                onClose={() => setSelectedId(null)}
              />
            )}

            {/* ---- KEY FINDINGS ---- */}
            <section>
              <h2 className="text-sm font-bold text-gray-800 mb-4 tracking-tight">Hallazgos Clave</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {keyFindings.map((finding, i) => (
                  <div
                    key={i}
                    className="rounded-xl bg-white p-5"
                    style={{
                      boxShadow: '0 1px 8px rgba(0,0,0,0.06)',
                      borderLeft: `3px solid ${finding.color}`,
                    }}
                  >
                    <h4 className="text-sm font-bold text-gray-800 mb-3">{finding.title}</h4>
                    <ul className="space-y-2">
                      {finding.items.map((item, j) => (
                        <li key={j} className="flex items-start gap-2 text-[13px] text-gray-600 leading-snug">
                          <span
                            className="w-1.5 h-1.5 rounded-full mt-[5px] flex-shrink-0"
                            style={{ backgroundColor: finding.color }}
                          />
                          {item}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            </section>
          </main>

          {/* ---- FOOTER ---- */}
          <footer className="border-t border-gray-100 mt-8">
            <div className="max-w-7xl mx-auto px-6 py-5 flex flex-col sm:flex-row items-center justify-between text-[11px] text-gray-400">
              <span>Analisis de Operaciones &middot; Aston Insurance Group &middot; Marzo 2026</span>
              <span className="mt-1 sm:mt-0">Preparado por <span className="font-semibold text-gray-500">Run Crewless</span></span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
