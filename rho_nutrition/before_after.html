<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rho Nutrition — Before/After Automation</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #0a0a0a; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    .toggle-pill { transition: all 0.2s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const GREEN = "#0D9B6C";

    const PROCESSES = [
      {
        id: 1,
        name: "Post-purchase LTV Extension",
        category: "Retention",
        phase: "Q2",
        before: { status: "Missing", detail: "No post-purchase education sequence exists. LTV stuck at ~3 months with no automation mechanism to push subscribers toward the 4–5 product escape velocity threshold." },
        after:  { status: "Automated", detail: "Klaviyo sequence: product education at days 7, 14, 21 + cross-sell trigger at day 21. Every 15 days of avg LTV extension = $3.9M in zero-CAC revenue." },
        impact: "$3.9M–7.8M/yr", implCost: "$16,000", roi: "1,950x"
      },
      {
        id: 2,
        name: "Trustpilot Review Repair",
        category: "Reputation",
        phase: "Q1",
        before: { status: "Critical", detail: "Score 1.7/5 visible in Google results. 88% one-star reviews — all operational failures. Suppressing conversion on the $140M D2C channel." },
        after:  { status: "Automated", detail: "Post-delivery Klaviyo fork: satisfied customers → Trustpilot; dissatisfied → CS ticket auto-created. Score reaches 3.5+ in 60–90 days." },
        impact: "$420K–1.4M/yr", implCost: "$4,500", roi: "1,890x"
      },
      {
        id: 3,
        name: "Postscript SMS Activation",
        category: "Revenue",
        phase: "Q1",
        before: { status: "Inactive", detail: "Contract signed and paid for. Never activated. $0 revenue from an asset already on the books." },
        after:  { status: "Automated", detail: "3-touch cart recovery + pre-churn SMS at renewal moment + win-back trigger. Platform cost: already paid." },
        impact: "$1.4M–2.5M/yr", implCost: "$6,500", roi: "1,587x"
      },
      {
        id: 4,
        name: "Win-Back Sequence",
        category: "Retention",
        phase: "Q2",
        before: { status: "Missing", detail: "~33% monthly churn = 21,500 subscribers lost every month. No systematic outreach. They simply leave and are never contacted again." },
        after:  { status: "Automated", detail: "Day 0, 7, 30 post-churn: email + SMS 3-touch with escalating incentive. 2–3% reactivation = $51K–78K/month recovered." },
        impact: "$620K–1.86M/yr", implCost: "$10,000", roi: "1,116x"
      },
      {
        id: 5,
        name: "Multi-Product Escape Velocity",
        category: "LTV",
        phase: "Q3",
        before: { status: "Missing", detail: "The escape velocity concept (5+ products = near-zero churn) has no automation engine. Subscribers stay at 1–2 products." },
        after:  { status: "Automated", detail: "Behavioral triggers at months 2, 3, 4: complementary product recommendations based on purchase history." },
        impact: "$1M–2M/yr", implCost: "$11,500", roi: "879x"
      },
      {
        id: 6,
        name: "Creative AI Dashboard",
        category: "Growth",
        phase: "Q3",
        before: { status: "Manual", detail: "Creative loop: source UGC → test → pull data manually → analyze → write brief → repeat. 20–30 hrs/wk team time." },
        after:  { status: "Automated", detail: "Meta + YouTube data auto-pulled → AI brief generator. Reduces iteration cycle time and compounds CAC performance." },
        impact: "$1M–1.5M/yr", implCost: "$20,000", roi: "420x"
      },
      {
        id: 7,
        name: "Pre-Renewal Notifications",
        category: "CS Reduction",
        phase: "Q1",
        before: { status: "Broken", detail: "\"Didn't get renewal email\" is the #2 CS ticket driver. Notifications are unreliable. Creates surprise charges, chargebacks, FTC exposure." },
        after:  { status: "Automated", detail: "Rebuilt Klaviyo flow: 7-day, 3-day, 24-hour pre-billing emails. Eliminates ~15% of Zendesk ticket volume." },
        impact: "$97K–200K/yr", implCost: "$3,000", roi: "325x"
      },
      {
        id: 8,
        name: "Shipping / Tracking",
        category: "CS Reduction",
        phase: "Q1",
        before: { status: "Manual", detail: "\"Where's my package\" = ~25% of ticket volume. Agents manually look up tracking for every inquiry — pure data lookup." },
        after:  { status: "Automated", detail: "Wonderment + Zendesk auto-reply with tracking link. Eliminates 60–80% of shipping tickets." },
        impact: "$77K/yr", implCost: "$4,500", roi: "171x"
      },
      {
        id: 9,
        name: "Zendesk ↔ Shopify + Retextion",
        category: "Ops Efficiency",
        phase: "Q2",
        before: { status: "Siloed", detail: "Zendesk is standalone. Every ticket requires agents to tab-switch to Shopify and Retextion. 5,000+ tickets/week × 2–3 min overhead each." },
        after:  { status: "Integrated", detail: "Zendesk sidebar shows full order history + subscription status inline. 40% handle time reduction." },
        impact: "$108K/yr", implCost: "$7,500", roi: "130x"
      },
      {
        id: 10,
        name: "Zendesk AI Deflection",
        category: "CS Automation",
        phase: "Q2",
        before: { status: "Manual", detail: "Top 3 ticket types make up 75–80% of volume and are highly repetitive. Each requires a human agent to respond with the same answer." },
        after:  { status: "Automated", detail: "AI macros + auto-routing for cancel/renewal/tracking. 30–40% ticket deflection." },
        impact: "$130K–208K/yr", implCost: "$20,000", roi: "68x"
      }
    ];

    const STATUS_COLORS = {
      "Missing":  { border: "#EF4444", tag: "#FEF2F2", tagText: "#991B1B" },
      "Critical": { border: "#EF4444", tag: "#FEF2F2", tagText: "#991B1B" },
      "Inactive": { border: "#F59E0B", tag: "#FFFBEB", tagText: "#92400E" },
      "Broken":   { border: "#F59E0B", tag: "#FFFBEB", tagText: "#92400E" },
      "Manual":   { border: "#6B7280", tag: "#F9FAFB", tagText: "#374151" },
      "Siloed":   { border: "#6B7280", tag: "#F9FAFB", tagText: "#374151" },
      "Automated":{ border: GREEN,     tag: "#ECFDF5", tagText: "#065F46" },
      "Integrated":{ border: GREEN,    tag: "#ECFDF5", tagText: "#065F46" },
    };

    const PHASES = [
      {
        label: "Q1 — Foundation",
        months: "Month 1–3",
        cost: "$13K–24K",
        impact: "$2M–4.1M/yr",
        items: ["Trustpilot review repair", "Postscript SMS activation", "Pre-renewal notifications", "Shipping / tracking automation"]
      },
      {
        label: "Q2 — Retention Engine",
        months: "Month 3–6",
        cost: "$40K–67K",
        impact: "$4.76M–9.97M/yr",
        items: ["Post-purchase LTV extension", "Win-back sequence", "Zendesk integrations", "AI ticket deflection"]
      },
      {
        label: "Q3 — Scale",
        months: "Month 6–9",
        cost: "$41K–73K",
        impact: "$2.05M–3.6M/yr",
        items: ["Escape velocity triggers", "Creative AI dashboard", "Wholesale automation", "Science research AI"]
      }
    ];

    function Tag({ label, color }) {
      const c = STATUS_COLORS[label] || { tag: "#F3F4F6", tagText: "#374151" };
      return (
        <span style={{ background: c.tag, color: c.tagText }} className="text-xs font-semibold px-2 py-0.5 rounded">
          {label}
        </span>
      );
    }

    function ProcessCard({ p, isAfter, expanded, onToggle }) {
      const state = isAfter ? p.after : p.before;
      const sc = STATUS_COLORS[state.status] || {};
      return (
        <div
          onClick={onToggle}
          className="cursor-pointer rounded-lg border border-gray-100 bg-white hover:border-gray-300 transition-all"
          style={{ borderLeft: `3px solid ${sc.border || "#D1D5DB"}` }}
        >
          <div className="px-4 py-4">
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1.5">
                  <span className="text-xs font-semibold text-gray-400 tracking-wider uppercase">{p.phase}</span>
                  <span className="text-gray-200">·</span>
                  <span className="text-xs text-gray-400">{p.category}</span>
                </div>
                <p className="text-sm font-semibold text-gray-900 leading-tight">{p.name}</p>
              </div>
              <div className="text-right shrink-0">
                <Tag label={state.status} />
                {isAfter && <div className="text-xs mt-1" style={{ color: GREEN }}>{p.impact}</div>}
              </div>
            </div>
            {expanded && (
              <div className="mt-3 pt-3 border-t border-gray-100 fade-in">
                <p className="text-sm text-gray-500 leading-relaxed">{state.detail}</p>
                {isAfter && (
                  <div className="mt-3 flex gap-3">
                    <div className="flex-1 bg-gray-50 rounded-md px-3 py-2">
                      <div className="text-xs text-gray-400 mb-0.5">Investment</div>
                      <div className="text-sm font-semibold text-gray-900">{p.implCost}</div>
                    </div>
                    <div className="flex-1 rounded-md px-3 py-2" style={{ background: "#ECFDF5" }}>
                      <div className="text-xs mb-0.5" style={{ color: "#047857" }}>ROI</div>
                      <div className="text-sm font-semibold" style={{ color: GREEN }}>{p.roi}</div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("before");
      const [expanded, setExpanded] = useState(null);
      const isAfter = view === "after";

      return (
        <div className="min-h-screen bg-white">
          {/* Top bar */}
          <div className="border-b border-gray-100 px-8 py-5 flex items-center justify-between">
            <div>
              <p className="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-0.5">Crewless</p>
              <h1 className="text-xl font-bold text-gray-900">Rho Nutrition — Automation Audit</h1>
            </div>
            <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
              <button
                onClick={() => setView("before")}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${!isAfter ? "bg-white text-gray-900 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}
              >
                Before
              </button>
              <button
                onClick={() => setView("after")}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${isAfter ? "bg-white text-gray-900 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}
              >
                After
              </button>
            </div>
          </div>

          {/* Metrics strip */}
          <div className="border-b border-gray-100">
            <div className="px-8 py-6 grid grid-cols-2 md:grid-cols-4 gap-6">
              {isAfter ? (
                <>
                  <Metric label="Annual Impact" value="$13.5M" sub="revenue + savings (mid)" accent />
                  <Metric label="Investment" value="$94K" sub="total implementation" />
                  <Metric label="Payback" value="< 3 days" sub="Q1 alone covers it" />
                  <Metric label="3-Year Benefit" value="$31.8M" sub="cumulative net" />
                </>
              ) : (
                <>
                  <Metric label="Revenue Gap" value="$14.7M" sub="missing processes / year" accent red />
                  <Metric label="Trustpilot" value="1.7 / 5" sub="88% one-star reviews" red />
                  <Metric label="Postscript" value="$0" sub="contract paid, never live" red />
                  <Metric label="Monthly Churn" value="21,500" sub="subscribers lost / month" red />
                </>
              )}
            </div>
          </div>

          <div className="px-8 py-8 max-w-7xl mx-auto">
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-sm font-semibold tracking-wider text-gray-400 uppercase">
                {isAfter ? "10 Processes — After Automation" : "10 Processes — Current State"}
              </h2>
              <span className="text-xs text-gray-400">Click to expand</span>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
              {PROCESSES.map(p => (
                <ProcessCard
                  key={p.id}
                  p={p}
                  isAfter={isAfter}
                  expanded={expanded === p.id}
                  onToggle={() => setExpanded(expanded === p.id ? null : p.id)}
                />
              ))}
            </div>

            {/* LTV Math */}
            <div className="mb-10">
              <h2 className="text-sm font-semibold tracking-wider text-gray-400 uppercase mb-1">LTV Extension Math</h2>
              <p className="text-sm text-gray-400 mb-5">65,000 subscribers × $120 AOV — every additional day retained</p>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <LTVCard days="+15 days" scenario="3.0 → 3.5 months" value="$3.9M/yr" sub="$11.7M over 3 years" highlight={false} />
                <LTVCard days="+30 days" scenario="3.0 → 4.0 months" value="$7.8M/yr" sub="$23.4M over 3 years" highlight={true} />
                <LTVCard days="+60 days" scenario="3.0 → 5.0 months" value="$15.6M/yr" sub="$46.8M over 3 years" highlight={false} />
              </div>
            </div>

            {/* Roadmap — only in after view */}
            {isAfter && (
              <div className="fade-in">
                <h2 className="text-sm font-semibold tracking-wider text-gray-400 uppercase mb-5">3-Phase Roadmap</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {PHASES.map((ph, i) => (
                    <div key={i} className="rounded-lg border border-gray-100 p-5">
                      <div className="mb-4">
                        <div className="text-xs font-semibold text-gray-400 tracking-wider uppercase mb-1">{ph.months}</div>
                        <h3 className="text-sm font-bold text-gray-900">{ph.label}</h3>
                      </div>
                      <div className="flex justify-between text-sm mb-1">
                        <span className="text-gray-400">Investment</span>
                        <span className="font-medium text-gray-900">{ph.cost}</span>
                      </div>
                      <div className="flex justify-between text-sm mb-4">
                        <span className="text-gray-400">Impact</span>
                        <span className="font-semibold" style={{ color: GREEN }}>{ph.impact}</span>
                      </div>
                      <div className="space-y-1.5 pt-3 border-t border-gray-100">
                        {ph.items.map((item, j) => (
                          <div key={j} className="flex items-start gap-2 text-xs text-gray-500">
                            <span className="mt-0.5 w-3 h-3 rounded-full shrink-0 flex items-center justify-center" style={{ background: "#ECFDF5" }}>
                              <span style={{ color: GREEN, fontSize: "8px", fontWeight: "bold" }}>✓</span>
                            </span>
                            {item}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div className="border-t border-gray-100 px-8 py-5 flex justify-between items-center">
            <span className="text-xs text-gray-300">Prepared by Crewless · March 2, 2026 · Confidential</span>
            <span className="text-xs text-gray-300">Figures are conservative estimates based on stated metrics</span>
          </div>
        </div>
      );
    }

    function Metric({ label, value, sub, accent, red }) {
      const color = accent ? GREEN : red ? "#EF4444" : "#0a0a0a";
      return (
        <div>
          <div className="text-3xl font-black leading-none mb-1" style={{ color }}>{value}</div>
          <div className="text-xs font-semibold text-gray-900 mb-0.5">{label}</div>
          <div className="text-xs text-gray-400">{sub}</div>
        </div>
      );
    }

    function LTVCard({ days, scenario, value, sub, highlight }) {
      return (
        <div
          className="rounded-lg p-5"
          style={highlight
            ? { background: GREEN, color: "#fff" }
            : { border: "1px solid #F3F4F6", background: "#fff" }
          }
        >
          <div className="text-2xl font-black mb-0.5" style={highlight ? { color: "#fff" } : { color: GREEN }}>{days}</div>
          <div className="text-xs mb-3" style={highlight ? { color: "rgba(255,255,255,0.7)" } : { color: "#9CA3AF" }}>{scenario}</div>
          <div className="text-lg font-bold" style={highlight ? { color: "#fff" } : { color: "#0a0a0a" }}>{value}</div>
          <div className="text-xs mt-0.5" style={highlight ? { color: "rgba(255,255,255,0.6)" } : { color: "#9CA3AF" }}>{sub}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
