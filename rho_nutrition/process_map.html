<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rho Nutrition — Process Map</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .missing-node { border-style: dashed !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ─────────────────────────────────────────────────────────────
       STATUS LEGEND
       critical  → bg-red-500      (immediate attention)
       automate  → bg-green-500    (high ROI opportunity)
       warning   → bg-yellow-500   (needs improvement)
       missing   → bg-red-100 border-dashed border-2 border-red-500 text-red-700
       manual    → bg-blue-500     (human-dependent, working)
       normal    → bg-gray-400     (working fine)
    ───────────────────────────────────────────────────────────── */

    const STATUS_STYLES = {
      critical: { bg: "bg-red-500", text: "text-white", label: "Critical", dot: "bg-red-500" },
      automate: { bg: "bg-green-500", text: "text-white", label: "Automate", dot: "bg-green-500" },
      warning:  { bg: "bg-yellow-400", text: "text-gray-900", label: "Warning", dot: "bg-yellow-400" },
      missing:  { bg: "bg-red-50 border-2 border-dashed border-red-400", text: "text-red-700", label: "Missing", dot: "bg-red-300" },
      manual:   { bg: "bg-blue-500", text: "text-white", label: "Manual", dot: "bg-blue-500" },
      normal:   { bg: "bg-gray-400", text: "text-white", label: "Normal", dot: "bg-gray-400" },
    };

    const COLUMNS = [
      {
        id: "acquisition",
        label: "Acquisition",
        icon: "📢",
        nodes: [
          {
            id: "paid_media",
            name: "Paid Media",
            status: "normal",
            time: "Full-time growth team",
            savings: "—",
            desc: "Meta (largest), TV, podcasts, YouTube. Growth team + media buying team described as strong. Heavy paid investment driving acquisition.",
            action: "No immediate action needed. Creative AI dashboard (Q3) will compound performance."
          },
          {
            id: "ugc_sourcing",
            name: "UGC Sourcing",
            status: "manual",
            time: "Partners team manages",
            savings: "—",
            desc: "Influencer and creative partner relationships managed by Partners team. UGC fed into ad testing loop.",
            action: "Manual but functional. Creative AI dashboard will accelerate iteration."
          },
          {
            id: "creative_brief",
            name: "Creative Brief Loop",
            status: "automate",
            time: "20–30 hrs/wk manual",
            savings: "$1M–1.5M/yr",
            desc: "Manual cycle: source UGC → test → pull Meta/YouTube data → analyze → write brief → repeat. No structured AI layer. Growth team spends 20–30 hrs/week on analysis alone.",
            action: "Q3: Auto-pull Meta + YouTube data → AI brief generator. Reduces iteration cycle time and compounds creative performance."
          },
          {
            id: "ad_testing",
            name: "Ad Testing",
            status: "normal",
            time: "Growth team ongoing",
            savings: "—",
            desc: "Active A/B testing on Meta and YouTube. Platform is strong; the bottleneck is the brief generation loop upstream.",
            action: "No immediate action. Benefits compounding once Creative AI Dashboard is live."
          }
        ]
      },
      {
        id: "onboarding",
        label: "Onboarding",
        icon: "🛒",
        nodes: [
          {
            id: "shopify_purchase",
            name: "Shopify Purchase",
            status: "normal",
            time: "Automated",
            savings: "—",
            desc: "Core DTC storefront. 65–67% of new customers subscribe on first purchase at checkout. Shopify Shop ID: 66199126266.",
            action: "Working. Ensure Klaviyo and Postscript triggers fire correctly on subscription purchase."
          },
          {
            id: "klaviyo_welcome",
            name: "Klaviyo Welcome Sequence",
            status: "warning",
            time: "Active — optimization unknown",
            savings: "Unclear",
            desc: "Welcome sequence likely exists in Klaviyo but specific flows are unknown. Not confirmed as optimized. No post-purchase education sequence confirmed.",
            action: "Audit active Klaviyo flows immediately. Identify gaps before adding new sequences (Q2 LTV sequence builds on this)."
          },
          {
            id: "sub_portal_setup",
            name: "Subscription Portal Setup",
            status: "warning",
            time: "Self-service, FTC compliant",
            savings: "Portal discoverability issue",
            desc: "Retextion self-service portal exists. FTC compliant with first-click cancel + pause/postpone offer. Despite this, cancel requests remain the #1 ticket type — portal discoverability/trust issue.",
            action: "Audit portal discoverability in post-purchase flow. Add portal link to onboarding sequence and renewal notifications."
          },
          {
            id: "no_edu_sequence",
            name: "Product Education Sequence",
            status: "missing",
            time: "MISSING",
            savings: "$3.9M–7.8M/yr",
            desc: "No systematic post-purchase education sequence confirmed. Subscribers receive product but get no structured onboarding to drive product adoption, understand benefits, or cross-sell opportunities.",
            action: "Q2 PRIORITY: Build Klaviyo education + cross-sell + milestone sequences. Days 7, 14, 21 post-purchase. This is the single largest revenue lever in the business."
          }
        ]
      },
      {
        id: "servicing",
        label: "Servicing",
        icon: "🎧",
        nodes: [
          {
            id: "zendesk_tickets",
            name: "Zendesk Ticketing",
            status: "critical",
            time: "4,000–7,000 tickets/wk",
            savings: "$415K/yr combined deflection",
            desc: "20 nearshore agents (Colombia) + 3 leads + 1 stateside CS director. Email-only, 24-hr SLA (48 weekend). Zendesk operates in isolation — no Shopify or Retextion integration.",
            action: "Multiple Q1–Q2 interventions: pre-renewal fix, shipping automation, then Zendesk integration and AI deflection."
          },
          {
            id: "cancel_tickets",
            name: "Cancel/Modify Sub (35%)",
            status: "automate",
            time: "~1,400–2,450 tickets/wk",
            savings: "30–40% deflectable",
            desc: "#1 ticket type at 35–40% of volume. Despite FTC-compliant self-service portal existing, customers continue to email. Portal discoverability and trust are the root cause.",
            action: "Q2: Zendesk AI macro — cancel request auto-reply with portal link + step-by-step instructions. 30–40% deflection rate."
          },
          {
            id: "renewal_tickets",
            name: "No Renewal Email (15%)",
            status: "critical",
            time: "~600–1,050 tickets/wk",
            savings: "$97K–200K/yr",
            desc: "#2 ticket driver. Pre-renewal Klaviyo notifications are unreliable or broken. Creates surprise charges → CS tickets + chargeback risk. FTC exposure.",
            action: "Q1 IMMEDIATE: Rebuild pre-renewal Klaviyo flow. 7-day, 3-day, 24-hour emails before billing. Eliminates this ticket category."
          },
          {
            id: "tracking_tickets",
            name: "Where's My Package (25%)",
            status: "automate",
            time: "~1,000–1,750 tickets/wk",
            savings: "$51K–77K/yr",
            desc: "#3 ticket type. Pure data lookup — should never require a human agent. Agents manually check tracking for each inquiry.",
            action: "Q1: Wonderment integration → proactive shipping event emails + Zendesk auto-reply with tracking. Eliminates 60–80% of these tickets."
          },
          {
            id: "zendesk_integration",
            name: "Zendesk ↔ Shopify/Retextion",
            status: "critical",
            time: "2–3 min overhead every ticket",
            savings: "$108K/yr handle time",
            desc: "Every ticket requires agents to tab-switch to Shopify for order history and Retextion for subscription status. 5,000+ tickets/week × 2–3 min = massive handle time overhead.",
            action: "Q2: Zendesk app install + Retextion API sidebar. Agents see full context inside every ticket. 40% handle time reduction."
          }
        ]
      },
      {
        id: "retention",
        label: "Retention",
        icon: "🔄",
        nodes: [
          {
            id: "renewal_cycle",
            name: "28-Day Renewal Cycle",
            status: "normal",
            time: "Automated billing",
            savings: "—",
            desc: "28-day subscription billing cycle with 15% subscribe-and-save discount. 65–67% of new customers subscribe. Core revenue engine.",
            action: "Working. Pre-renewal notification fix (Q1) will reduce surprise cancellations."
          },
          {
            id: "pre_renewal_fix",
            name: "Pre-Renewal Notifications",
            status: "critical",
            time: "Broken/unreliable",
            savings: "$97K–200K/yr",
            desc: "Pre-renewal notification emails are not reliably received by subscribers. This is a Klaviyo deliverability or timing issue. Generates #2 ticket type and creates chargeback risk.",
            action: "Q1 IMMEDIATE: Rebuild. 7-day + 3-day + 24-hour pre-billing email sequence. FTC compliance strengthened."
          },
          {
            id: "churn_exit",
            name: "Churn (~33%/month)",
            status: "critical",
            time: "~21,500 subscribers/month",
            savings: "$620K–1.86M/yr",
            desc: "~33% monthly churn rate = ~21,500 subscribers leaving every month. No systematic mechanism to prevent, reduce, or recover churn. LTV stuck at ~3 months as a result.",
            action: "Q1: Postscript pre-churn SMS at renewal moment. Q2: Win-back sequence at day 0, 7, 30 post-churn."
          },
          {
            id: "winback_missing",
            name: "Win-Back Sequence",
            status: "missing",
            time: "MISSING",
            savings: "$620K–1.86M/yr",
            desc: "Zero systematic outreach to churned subscribers. 21,500 subscribers leave every month and are never contacted again. 2–3% reactivation = $51K–78K/month in recovered revenue.",
            action: "Q2: Email + SMS 3-touch win-back at day 0, 7, 30 post-churn. Conservative 2–3% reactivation rate."
          },
          {
            id: "trustpilot_repair",
            name: "Trustpilot Repair Flow",
            status: "missing",
            time: "MISSING — score 1.7/5",
            savings: "$420K–1.4M/yr",
            desc: "Trustpilot 1.7/5 visible in Google search results. 88% one-star — all operational failures. No post-delivery review routing exists. Happy customers go nowhere; unhappy customers post publicly.",
            action: "Q1 IMMEDIATE: Post-delivery Klaviyo fork. Satisfied → Trustpilot link. Dissatisfied → CS ticket auto-created. Score reaches 3.5+ in 60–90 days."
          }
        ]
      },
      {
        id: "revenue",
        label: "Revenue Opportunities",
        icon: "📈",
        nodes: [
          {
            id: "ltv_extension",
            name: "LTV Extension Sequence",
            status: "missing",
            time: "MISSING — LTV at 3 months",
            savings: "$3.9M–7.8M/yr",
            desc: "No structured post-purchase education or cross-sell sequence. LTV stuck at ~3 months with no automation mechanism to extend it. Every 15 days of LTV extension = $3.9M in zero-CAC revenue.",
            action: "Q2 TOP PRIORITY: Klaviyo education + cross-sell + milestone sequences. Build the compounding subscriber retention layer."
          },
          {
            id: "postscript_activation",
            name: "Postscript SMS",
            status: "missing",
            time: "Contract paid — $0 revenue",
            savings: "$1.4M–2.5M/yr",
            desc: "Postscript SMS platform contract is signed and paid for. Never been activated. Cart recovery alone (1% incremental) = $1.4M/year. No incremental platform cost.",
            action: "Q1 IMMEDIATE: Activate cart recovery (3-touch) + pre-churn SMS + win-back trigger. Fastest ROI in the audit."
          },
          {
            id: "escape_velocity",
            name: "Multi-Product Escape Velocity",
            status: "missing",
            time: "MISSING — no triggers",
            savings: "$1M–2M/yr",
            desc: "George's escape velocity concept (5+ products = near-zero churn) has no automation engine. Product recommendations are not triggered by purchase behavior. Subscribers stay at 1–2 products.",
            action: "Q3: Behavioral triggers at months 2, 3, 4 post-purchase. Recommend complementary products based on purchase history."
          },
          {
            id: "wholesale_ops",
            name: "Wholesale Workflow",
            status: "manual",
            time: "~15 admin hrs/wk",
            savings: "$36K–72K/yr",
            desc: "Invoice, fulfillment, and distributor coordination (Keehe) handled manually by admin team. VP of Commercialization stretched thin on retail relationships + supply chain coordination.",
            action: "Q3: Zapier/Make automation + auto PO confirmation + fulfillment status updates to distributors."
          },
          {
            id: "science_research",
            name: "Science AI Research",
            status: "automate",
            time: "~10 hrs/wk formulation team",
            savings: "$17K–40K/yr",
            desc: "Formulation team manually monitors clinical research (PubMed, databases) for ingredient validation and competitive intelligence. Science department size unknown.",
            action: "Q3: PubMed API + AI summarization + weekly Slack digest for formulation team."
          }
        ]
      }
    ];

    const TOOLS = [
      { name: "Shopify", status: "integrated", purpose: "Core DTC storefront", connects: "Klaviyo, Yotpo, Retextion, hCaptcha" },
      { name: "Klaviyo", status: "partial", purpose: "Email marketing + automation", connects: "Shopify — active flows unknown" },
      { name: "Postscript", status: "unconnected", purpose: "SMS/MMS campaigns", connects: "Shopify — NEVER ACTIVATED" },
      { name: "Retextion", status: "partial", purpose: "Subscription management portal", connects: "Shopify — NOT in Zendesk" },
      { name: "Zendesk", status: "standalone", purpose: "CS ticketing", connects: "STANDALONE — no Shopify/Retextion integration" },
      { name: "Yotpo", status: "integrated", purpose: "Product reviews + UGC", connects: "Shopify" },
      { name: "Elevar", status: "integrated", purpose: "Server-side tracking / attribution", connects: "Shopify + ad platforms" },
      { name: "Google Analytics", status: "integrated", purpose: "Web analytics", connects: "Shopify" },
      { name: "Clarity", status: "integrated", purpose: "Session recording / heatmaps", connects: "Shopify" },
      { name: "Trustpilot", status: "standalone", purpose: "External review platform", connects: "Not integrated — no review routing" },
      { name: "Amazon Seller Central", status: "standalone", purpose: "Amazon FBA channel", connects: "Standalone — supply chain team manages" },
    ];

    function App() {
      const [selectedNode, setSelectedNode] = useState(null);

      const findNode = (id) => {
        for (const col of COLUMNS) {
          const node = col.nodes.find(n => n.id === id);
          if (node) return { ...node, column: col.label };
        }
        return null;
      };

      const selected = selectedNode ? findNode(selectedNode) : null;

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Header */}
          <div className="bg-gradient-to-r from-slate-900 to-slate-700 text-white py-8 px-6">
            <div className="max-w-7xl mx-auto">
              <p className="text-xs font-semibold uppercase tracking-widest opacity-60 mb-1">Run Crewless — Business Automation Audit</p>
              <h1 className="text-2xl font-bold">Rho Nutrition — Process Map</h1>
              <p className="text-sm opacity-70 mt-1">Customer Lifecycle · $18–20M/month · 65K active subscribers</p>
              <div className="flex flex-wrap gap-3 mt-5">
                {Object.entries(STATUS_STYLES).map(([key, s]) => (
                  <div key={key} className="flex items-center gap-1.5 text-xs opacity-80">
                    <span className={`w-2.5 h-2.5 rounded-full ${s.dot}`}></span>
                    <span>{s.label}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 py-8">
            {/* Process Map Grid */}
            <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-10">
              {COLUMNS.map(col => (
                <div key={col.id}>
                  <div className="text-center mb-4">
                    <div className="text-2xl mb-1">{col.icon}</div>
                    <div className="text-sm font-bold text-gray-900">{col.label}</div>
                  </div>
                  <div className="space-y-2">
                    {col.nodes.map(node => (
                      <ProcessNode
                        key={node.id}
                        node={node}
                        selected={selectedNode === node.id}
                        onClick={() => setSelectedNode(selectedNode === node.id ? null : node.id)}
                      />
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Detail Panel */}
            {selected && (
              <div className="bg-white border border-gray-200 rounded-xl shadow-lg p-6 mb-10 fade-in">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1">
                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${STATUS_STYLES[selected.status]?.dot || "bg-gray-400"}`}>
                        {STATUS_STYLES[selected.status]?.label}
                      </span>
                      <span className="text-xs text-gray-400">{selected.column}</span>
                    </div>
                    <h3 className="text-lg font-bold text-gray-900 mb-1">{selected.name}</h3>
                    <div className="flex gap-6 text-sm mb-4">
                      <div><span className="text-gray-400">Current State: </span><span className="font-medium text-gray-800">{selected.time}</span></div>
                      <div><span className="text-gray-400">Impact: </span><span className="font-semibold text-teal-700">{selected.savings}</span></div>
                    </div>
                    <p className="text-sm text-gray-600 leading-relaxed mb-4">{selected.desc}</p>
                    <div className="bg-blue-50 border border-blue-100 rounded-lg px-4 py-3">
                      <div className="text-xs font-semibold text-blue-700 mb-1">RECOMMENDED ACTION</div>
                      <p className="text-sm text-blue-800">{selected.action}</p>
                    </div>
                  </div>
                  <button onClick={() => setSelectedNode(null)} className="text-gray-400 hover:text-gray-600 text-xl font-light">×</button>
                </div>
              </div>
            )}

            {/* Revenue Gap Summary */}
            <div className="bg-white border border-gray-200 rounded-xl p-6 mb-8 shadow-sm">
              <h2 className="text-base font-bold text-gray-900 mb-4">Missing Process Revenue Gaps</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                {[
                  { name: "Post-purchase LTV extension", gap: "$3.9M–7.8M/yr", phase: "Q2" },
                  { name: "Postscript SMS activation", gap: "$1.4M–2.5M/yr", phase: "Q1" },
                  { name: "Multi-product escape velocity", gap: "$1M–2M/yr", phase: "Q3" },
                  { name: "Win-back sequence", gap: "$620K–1.86M/yr", phase: "Q2" },
                  { name: "Trustpilot review repair", gap: "$420K–1.4M/yr", phase: "Q1" },
                  { name: "Pre-renewal notification fix", gap: "$97K–200K/yr", phase: "Q1" }
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between bg-red-50 border border-red-100 rounded-lg px-4 py-3">
                    <div>
                      <div className="text-xs text-gray-500 mb-0.5">{item.phase}</div>
                      <div className="text-sm font-medium text-gray-900">{item.name}</div>
                    </div>
                    <div className="text-sm font-bold text-red-700 text-right">{item.gap}</div>
                  </div>
                ))}
              </div>
              <div className="mt-4 p-3 bg-gray-900 rounded-lg flex justify-between items-center">
                <span className="text-white font-semibold text-sm">Total Estimated Revenue Gap (Midpoint)</span>
                <span className="text-yellow-400 font-black text-lg">$14.7M+ / year</span>
              </div>
            </div>

            {/* Data Systems */}
            <div className="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
              <h2 className="text-base font-bold text-gray-900 mb-4">Data Systems & Integration Status</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                {TOOLS.map((tool, i) => (
                  <div key={i} className="flex items-start justify-between gap-3 px-4 py-3 rounded-lg bg-gray-50 border border-gray-100">
                    <div className="flex-1">
                      <div className="font-semibold text-sm text-gray-900">{tool.name}</div>
                      <div className="text-xs text-gray-500">{tool.purpose}</div>
                      <div className="text-xs text-gray-400 mt-0.5">{tool.connects}</div>
                    </div>
                    <div className={`shrink-0 text-xs font-semibold px-2 py-1 rounded-full mt-0.5 ${
                      tool.status === "integrated" ? "bg-green-100 text-green-700" :
                      tool.status === "partial" ? "bg-yellow-100 text-yellow-700" :
                      tool.status === "standalone" ? "bg-red-100 text-red-700" :
                      "bg-red-200 text-red-900"
                    }`}>
                      {tool.status === "integrated" ? "Integrated ✓" :
                       tool.status === "partial" ? "Partial ⚠" :
                       tool.status === "standalone" ? "Standalone ✗" :
                       "NEVER ACTIVE ✗"}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="text-center text-xs text-gray-400 mt-8 pt-6 border-t border-gray-200">
              <p>Prepared by Run Crewless · March 2, 2026 · Confidential</p>
            </div>
          </div>
        </div>
      );
    }

    function ProcessNode({ node, selected, onClick }) {
      const s = STATUS_STYLES[node.status];
      const isMissing = node.status === "missing";

      return (
        <button
          onClick={onClick}
          className={`w-full text-left rounded-lg px-3 py-2.5 text-xs font-medium transition-all shadow-sm hover:shadow-md
            ${isMissing
              ? `bg-red-50 border-2 border-dashed border-red-400 text-red-700 ${selected ? "ring-2 ring-red-400" : ""}`
              : `${s.bg} ${s.text} ${selected ? "ring-2 ring-offset-1 ring-gray-900" : ""}`
            }
          `}
        >
          <div className="font-semibold leading-tight">{node.name}</div>
          <div className={`mt-0.5 leading-tight truncate ${isMissing ? "text-red-500 opacity-80" : "opacity-70"}`} style={{fontSize: "10px"}}>
            {node.time}
          </div>
          {node.savings !== "—" && node.savings !== "Unclear" && (
            <div className={`mt-1 font-bold ${isMissing ? "text-red-600" : "opacity-90"}`} style={{fontSize: "10px"}}>
              {node.savings}
            </div>
          )}
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
