<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rho Nutrition — Process Map</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #0a0a0a; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.2s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const GREEN = "#0D9B6C";

    /* Status system */
    const STATUS = {
      critical: { label: "Critical",  color: "#EF4444" },
      automate: { label: "Automate",  color: GREEN },
      warning:  { label: "Warning",   color: "#F59E0B" },
      missing:  { label: "Missing",   color: "#EF4444", dashed: true },
      manual:   { label: "Manual",    color: "#6B7280" },
      normal:   { label: "Working",   color: "#D1D5DB" },
    };

    const COLUMNS = [
      {
        id: "acquisition",
        label: "Acquisition",
        nodes: [
          {
            id: "paid_media",
            name: "Paid Media",
            status: "normal",
            time: "Full-time growth team",
            savings: null,
            desc: "Meta (largest), TV, podcasts, YouTube. Growth + media buying teams described as strong. Heavy paid investment driving acquisition.",
            action: "No immediate action. Creative AI dashboard (Q3) will compound performance."
          },
          {
            id: "ugc_sourcing",
            name: "UGC Sourcing",
            status: "manual",
            time: "Partners team manages",
            savings: null,
            desc: "Influencer and creative partner relationships managed by Partners team. UGC fed into ad testing loop.",
            action: "Manual but functional. Creative AI dashboard will accelerate iteration cycle."
          },
          {
            id: "creative_brief",
            name: "Creative Brief Loop",
            status: "automate",
            time: "20–30 hrs/wk manual",
            savings: "$1M–1.5M/yr",
            desc: "Manual cycle: source UGC → test → pull Meta/YouTube data → analyze → write brief → repeat. No AI layer. Growth team spends 20–30 hrs/week on analysis alone.",
            action: "Q3: Auto-pull Meta + YouTube data → AI brief generator. Reduces iteration cycle and compounds CAC."
          },
          {
            id: "ad_testing",
            name: "Ad Testing",
            status: "normal",
            time: "Growth team ongoing",
            savings: null,
            desc: "Active A/B testing on Meta and YouTube. Platform is strong; the bottleneck is brief generation upstream.",
            action: "No immediate action. Benefits compound once Creative AI Dashboard is live."
          }
        ]
      },
      {
        id: "onboarding",
        label: "Onboarding",
        nodes: [
          {
            id: "shopify_purchase",
            name: "Shopify Purchase",
            status: "normal",
            time: "Automated",
            savings: null,
            desc: "Core DTC storefront. 65–67% of new customers subscribe on first purchase. 80% of total revenue.",
            action: "Working. Ensure Klaviyo and Postscript triggers fire correctly on subscription purchase."
          },
          {
            id: "klaviyo_welcome",
            name: "Klaviyo Welcome",
            status: "warning",
            time: "Active — optimization unknown",
            savings: null,
            desc: "Welcome sequence likely exists but specific flows are unknown. Not confirmed as optimized. Post-purchase education not confirmed.",
            action: "Audit Klaviyo flows immediately. Identify gaps before Q2 LTV sequence is added on top."
          },
          {
            id: "sub_portal_setup",
            name: "Subscription Portal",
            status: "warning",
            time: "Self-service, FTC compliant",
            savings: null,
            desc: "Retextion self-service portal exists. Despite this, cancel requests remain the #1 ticket type — portal discoverability issue.",
            action: "Audit portal discoverability in post-purchase flow. Add portal link to onboarding and renewal emails."
          },
          {
            id: "no_edu_sequence",
            name: "Product Education",
            status: "missing",
            time: "MISSING",
            savings: "$3.9M–7.8M/yr",
            desc: "No systematic post-purchase education sequence. Subscribers receive product but get no structured onboarding to drive adoption or cross-sell.",
            action: "Q2 PRIORITY: Klaviyo education + cross-sell + milestone sequences. Days 7, 14, 21. Largest revenue lever in the business."
          }
        ]
      },
      {
        id: "servicing",
        label: "Servicing",
        nodes: [
          {
            id: "zendesk_tickets",
            name: "Zendesk Ticketing",
            status: "critical",
            time: "4K–7K tickets/wk",
            savings: "$415K/yr",
            desc: "20 nearshore agents (Colombia) + 3 leads + 1 stateside director. Email-only, 24-hr SLA. Zendesk is completely isolated — no Shopify or Retextion integration.",
            action: "Multiple interventions Q1–Q2: pre-renewal fix, shipping automation, then integration and AI deflection."
          },
          {
            id: "cancel_tickets",
            name: "Cancel / Modify (35%)",
            status: "automate",
            time: "1,400–2,450/wk",
            savings: "30–40% deflectable",
            desc: "#1 ticket type. Despite FTC-compliant self-service portal, customers still email. Portal discoverability is the root cause.",
            action: "Q2: Zendesk AI macro — cancel request auto-reply with portal link + step-by-step. 30–40% deflection."
          },
          {
            id: "renewal_tickets",
            name: "Renewal Confusion (15%)",
            status: "critical",
            time: "600–1,050/wk",
            savings: "$97K–200K/yr",
            desc: "#2 ticket driver. Pre-renewal notifications are unreliable or broken. Creates surprise charges and chargeback risk.",
            action: "Q1 IMMEDIATE: Rebuild pre-renewal Klaviyo. 7-day, 3-day, 24-hour pre-billing emails."
          },
          {
            id: "tracking_tickets",
            name: "Where's My Package (25%)",
            status: "automate",
            time: "1,000–1,750/wk",
            savings: "$51K–77K/yr",
            desc: "#3 ticket type. Pure data lookup — should never require a human agent.",
            action: "Q1: Wonderment + proactive shipping events + Zendesk auto-reply. Eliminates 60–80% of these tickets."
          },
          {
            id: "zendesk_integration",
            name: "Zendesk Standalone",
            status: "critical",
            time: "2–3 min overhead/ticket",
            savings: "$108K/yr",
            desc: "Agents tab-switch to Shopify + Retextion for every ticket. 5,000+ tickets/week × 2–3 min = massive overhead.",
            action: "Q2: Zendesk app + Retextion sidebar. Agents see full context inside every ticket. 40% handle time reduction."
          }
        ]
      },
      {
        id: "retention",
        label: "Retention",
        nodes: [
          {
            id: "renewal_cycle",
            name: "28-Day Renewal Cycle",
            status: "normal",
            time: "Automated billing",
            savings: null,
            desc: "28-day subscription billing with 15% subscribe-and-save discount. 65–67% of new customers subscribe.",
            action: "Working. Pre-renewal notification fix (Q1) will reduce surprise cancellations."
          },
          {
            id: "pre_renewal_fix",
            name: "Pre-Renewal Emails",
            status: "critical",
            time: "Broken / unreliable",
            savings: "$97K–200K/yr",
            desc: "Pre-renewal emails are not reliably received. Klaviyo deliverability or timing issue. Generates #2 ticket + chargeback risk.",
            action: "Q1: Rebuild. 7-day + 3-day + 24-hour pre-billing sequence. FTC compliance strengthened."
          },
          {
            id: "churn_exit",
            name: "Churn (~33%/month)",
            status: "critical",
            time: "~21,500 subs/month",
            savings: "$620K–1.86M/yr",
            desc: "~21,500 subscribers leave every month. No systematic mechanism to prevent, reduce, or recover churn.",
            action: "Q1: Postscript pre-churn SMS at renewal moment. Q2: Win-back sequence at day 0, 7, 30."
          },
          {
            id: "winback_missing",
            name: "Win-Back Sequence",
            status: "missing",
            time: "MISSING",
            savings: "$620K–1.86M/yr",
            desc: "Zero outreach to churned subscribers. 21,500 leave every month and are never contacted again.",
            action: "Q2: Email + SMS 3-touch at day 0, 7, 30. Conservative 2–3% reactivation = $51K–78K/month recovered."
          },
          {
            id: "trustpilot_repair",
            name: "Trustpilot Repair",
            status: "missing",
            time: "MISSING — 1.7/5",
            savings: "$420K–1.4M/yr",
            desc: "1.7/5 in Google results. 88% one-star — all operational. No post-delivery review routing exists.",
            action: "Q1: Post-delivery Klaviyo fork. Satisfied → Trustpilot. Dissatisfied → CS ticket. Score 3.5+ in 60–90 days."
          }
        ]
      },
      {
        id: "revenue",
        label: "Revenue Ops",
        nodes: [
          {
            id: "ltv_extension",
            name: "LTV Extension",
            status: "missing",
            time: "MISSING — LTV ~3 months",
            savings: "$3.9M–7.8M/yr",
            desc: "No structured post-purchase education or cross-sell sequence. Every 15 days of LTV extension = $3.9M in zero-CAC revenue.",
            action: "Q2 TOP PRIORITY: Klaviyo education + cross-sell + milestone sequences. The compounding retention layer."
          },
          {
            id: "postscript_activation",
            name: "Postscript SMS",
            status: "missing",
            time: "Paid — $0 generated",
            savings: "$1.4M–2.5M/yr",
            desc: "Contract signed and paid. Never activated. Cart recovery alone (1%) = $1.4M/year. Zero incremental platform cost.",
            action: "Q1 IMMEDIATE: Cart recovery (3-touch) + pre-churn SMS + win-back trigger. Fastest ROI in the audit."
          },
          {
            id: "escape_velocity",
            name: "Escape Velocity",
            status: "missing",
            time: "MISSING — no triggers",
            savings: "$1M–2M/yr",
            desc: "5+ products = near-zero churn — no automation engine. Subscribers stay at 1–2 products with no behavioral triggers.",
            action: "Q3: Behavioral triggers at months 2, 3, 4. Complementary product recommendations by purchase history."
          },
          {
            id: "wholesale_ops",
            name: "Wholesale Workflow",
            status: "manual",
            time: "~15 admin hrs/wk",
            savings: "$36K–72K/yr",
            desc: "Invoice, fulfillment, distributor coordination (Keehe) handled manually. VP Commercialization stretched thin.",
            action: "Q3: Zapier/Make automation + auto PO confirmation + fulfillment status updates."
          },
          {
            id: "science_research",
            name: "Science Research",
            status: "automate",
            time: "~10 hrs/wk manual",
            savings: "$17K–40K/yr",
            desc: "Formulation team manually monitors PubMed + databases for ingredient validation and competitive intelligence.",
            action: "Q3: PubMed API + AI summarization + weekly Slack digest."
          }
        ]
      }
    ];

    const TOOLS = [
      { name: "Shopify",          status: "integrated",   note: "Core DTC — connected to Klaviyo, Yotpo, Retextion, Elevar" },
      { name: "Klaviyo",          status: "partial",      note: "Email active — flows audit needed" },
      { name: "Postscript",       status: "inactive",     note: "CONTRACT SIGNED — NEVER ACTIVATED" },
      { name: "Retextion",        status: "partial",      note: "Subscription portal — NOT integrated with Zendesk" },
      { name: "Zendesk",          status: "standalone",   note: "CS ticketing — STANDALONE, no Shopify/Retextion connection" },
      { name: "Yotpo",            status: "integrated",   note: "Product reviews + UGC" },
      { name: "Elevar",           status: "integrated",   note: "Server-side tracking + attribution" },
      { name: "Google Analytics", status: "integrated",   note: "Web analytics" },
      { name: "Clarity",          status: "integrated",   note: "Session recording / heatmaps" },
      { name: "Trustpilot",       status: "standalone",   note: "External review platform — no routing integration" },
      { name: "Amazon Seller",    status: "standalone",   note: "Amazon FBA — supply chain team manages separately" },
    ];

    const TOOL_STATUS = {
      integrated:  { label: "Integrated", bg: "#ECFDF5", color: "#065F46" },
      partial:     { label: "Partial",    bg: "#FFFBEB", color: "#92400E" },
      standalone:  { label: "Standalone", bg: "#FEF2F2", color: "#991B1B" },
      inactive:    { label: "Inactive",   bg: "#FEF2F2", color: "#7F1D1D" },
    };

    function App() {
      const [selected, setSelected] = useState(null);

      const findNode = (id) => {
        for (const col of COLUMNS) {
          const node = col.nodes.find(n => n.id === id);
          if (node) return { ...node, column: col.label };
        }
        return null;
      };

      const selectedNode = selected ? findNode(selected) : null;

      return (
        <div className="min-h-screen bg-white">
          {/* Top bar */}
          <div className="border-b border-gray-100 px-8 py-5 flex items-center justify-between">
            <div>
              <p className="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-0.5">Run Crewless</p>
              <h1 className="text-xl font-bold text-gray-900">Rho Nutrition — Process Map</h1>
            </div>
            <div className="flex items-center gap-4">
              {Object.entries(STATUS).map(([key, s]) => (
                <div key={key} className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full shrink-0" style={{ background: s.color, border: s.dashed ? `1.5px dashed ${s.color}` : "none", background: s.dashed ? "transparent" : s.color }}></span>
                  <span className="text-xs text-gray-400">{s.label}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Revenue gap strip */}
          <div className="border-b border-gray-100 px-8 py-4 flex items-center gap-8">
            <div>
              <span className="text-xs text-gray-400 mr-2">Total Revenue Gap</span>
              <span className="text-lg font-black" style={{ color: "#EF4444" }}>$14.7M+ / year</span>
            </div>
            <div className="text-xs text-gray-300">·</div>
            <div>
              <span className="text-xs text-gray-400 mr-2">Investment to Close</span>
              <span className="text-lg font-black text-gray-900">$94K</span>
            </div>
            <div className="text-xs text-gray-300">·</div>
            <div>
              <span className="text-xs text-gray-400 mr-2">3-Year Benefit</span>
              <span className="text-lg font-black" style={{ color: GREEN }}>$31.8M</span>
            </div>
            <div className="ml-auto text-xs text-gray-400">Click any node for details</div>
          </div>

          {/* Process Map */}
          <div className="px-8 py-8 overflow-x-auto">
            <div className="grid gap-3 min-w-max" style={{ gridTemplateColumns: "repeat(5, 200px)" }}>
              {COLUMNS.map(col => (
                <div key={col.id}>
                  <div className="mb-3 pb-2 border-b border-gray-100">
                    <h2 className="text-xs font-semibold tracking-widest text-gray-400 uppercase">{col.label}</h2>
                  </div>
                  <div className="space-y-2">
                    {col.nodes.map(node => (
                      <ProcessNode
                        key={node.id}
                        node={node}
                        selected={selected === node.id}
                        onClick={() => setSelected(selected === node.id ? null : node.id)}
                      />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Detail panel */}
          {selectedNode && (
            <div className="mx-8 mb-8 rounded-lg border border-gray-200 p-6 fade-in">
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1">
                  <div className="flex items-center gap-3 mb-3">
                    <span className="text-xs font-semibold tracking-wider text-gray-400 uppercase">{selectedNode.column}</span>
                    <span className="text-gray-200">·</span>
                    <StatusBadge status={selectedNode.status} />
                    {selectedNode.savings && (
                      <>
                        <span className="text-gray-200">·</span>
                        <span className="text-xs font-bold" style={{ color: GREEN }}>{selectedNode.savings}</span>
                      </>
                    )}
                  </div>
                  <h3 className="text-base font-bold text-gray-900 mb-1">{selectedNode.name}</h3>
                  <p className="text-xs text-gray-400 mb-4">{selectedNode.time}</p>
                  <p className="text-sm text-gray-600 leading-relaxed mb-4">{selectedNode.desc}</p>
                  <div className="rounded-md px-4 py-3 text-sm" style={{ background: "#F0FDF9" }}>
                    <span className="text-xs font-semibold block mb-1" style={{ color: GREEN }}>RECOMMENDED ACTION</span>
                    <span className="text-gray-700">{selectedNode.action}</span>
                  </div>
                </div>
                <button
                  onClick={() => setSelected(null)}
                  className="text-gray-300 hover:text-gray-500 text-xl leading-none font-light"
                >
                  ×
                </button>
              </div>
            </div>
          )}

          {/* Gap table */}
          <div className="px-8 mb-8">
            <h2 className="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-4">Missing Process Gaps</h2>
            <div className="rounded-lg border border-gray-100 overflow-hidden">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase tracking-wider">Process</th>
                    <th className="text-left px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase tracking-wider">Phase</th>
                    <th className="text-right px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase tracking-wider">Annual Gap</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { name: "Post-purchase LTV extension", phase: "Q2", gap: "$3.9M–7.8M" },
                    { name: "Postscript SMS activation",   phase: "Q1", gap: "$1.4M–2.5M" },
                    { name: "Escape velocity triggers",    phase: "Q3", gap: "$1M–2M" },
                    { name: "Win-back sequence",           phase: "Q2", gap: "$620K–1.86M" },
                    { name: "Trustpilot repair flow",      phase: "Q1", gap: "$420K–1.4M" },
                    { name: "Pre-renewal notifications",   phase: "Q1", gap: "$97K–200K" },
                  ].map((row, i) => (
                    <tr key={i} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="px-4 py-3 text-gray-900">{row.name}</td>
                      <td className="px-4 py-3 text-gray-400 text-xs font-semibold">{row.phase}</td>
                      <td className="px-4 py-3 text-right font-semibold" style={{ color: "#EF4444" }}>{row.gap}</td>
                    </tr>
                  ))}
                  <tr className="bg-gray-900">
                    <td className="px-4 py-3 text-white font-semibold" colSpan={2}>Total (Midpoint)</td>
                    <td className="px-4 py-3 text-right font-black text-yellow-400">$14.7M+ / yr</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          {/* Tech stack */}
          <div className="px-8 mb-8">
            <h2 className="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-4">Tech Stack Integration Status</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
              {TOOLS.map((t, i) => {
                const s = TOOL_STATUS[t.status];
                return (
                  <div key={i} className="flex items-center justify-between px-4 py-3 rounded-lg border border-gray-100">
                    <div className="flex-1 min-w-0">
                      <span className="text-sm font-semibold text-gray-900 mr-2">{t.name}</span>
                      <span className="text-xs text-gray-400">{t.note}</span>
                    </div>
                    <span className="shrink-0 ml-3 text-xs font-semibold px-2 py-0.5 rounded" style={{ background: s.bg, color: s.color }}>
                      {s.label}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="border-t border-gray-100 px-8 py-5">
            <span className="text-xs text-gray-300">Prepared by Run Crewless · March 2, 2026 · Confidential</span>
          </div>
        </div>
      );
    }

    function ProcessNode({ node, selected, onClick }) {
      const s = STATUS[node.status];
      const isDashed = s?.dashed;

      return (
        <button
          onClick={onClick}
          className="w-full text-left rounded-md px-3 py-2.5 bg-white transition-all hover:bg-gray-50"
          style={{
            border: isDashed
              ? `1.5px dashed ${s.color}`
              : `1px solid #F3F4F6`,
            borderLeft: `3px solid ${s?.color || "#D1D5DB"}`,
            outline: selected ? `2px solid ${s?.color || "#D1D5DB"}` : "none",
            outlineOffset: "1px",
          }}
        >
          <div className="text-xs font-semibold text-gray-900 leading-tight">{node.name}</div>
          <div className="text-xs text-gray-400 mt-0.5 leading-tight" style={{ fontSize: "10px" }}>{node.time}</div>
          {node.savings && (
            <div className="text-xs font-semibold mt-1" style={{ color: s.color, fontSize: "10px" }}>{node.savings}</div>
          )}
        </button>
      );
    }

    function StatusBadge({ status }) {
      const s = STATUS[status];
      if (!s) return null;
      return (
        <span className="text-xs font-semibold px-2 py-0.5 rounded" style={{ background: `${s.color}18`, color: s.color }}>
          {s.label}
        </span>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
